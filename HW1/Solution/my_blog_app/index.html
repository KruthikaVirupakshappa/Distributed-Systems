<!DOCTYPE html>
<html lang="en">
    <head>
        <title>HW1-Kruthika Virupakshappa</title>
    </head>
    <body>
        <h1> My Blog Topic</h1>
        <form>
            <input id="title" type="text" name="title" placeholder="Enter the title of your blog" required autofocus/>
            <br>
            <input id="name" type="text" name="name" placeholder="Enter your name" required />
            <br>
            <input id="email" type="email" name="email" placeholder="Enter your email" required />
            <br>
            <textarea id="content" name="content" placeholder="Write your content here..." required></textarea>
            <br>

            <select id="category" name="category" required>
                <option value="Technology">Technology</option>
                <option value="Lifestyle">Lifestyle</option>
                <option value="Travel">Travel</option>
                <option value="Education">Education
                </option>
            </select>
            <br>

            <input type="checkbox" id="agree">
            <label for="agree">I agree to the terms and conditions</label>
            <br>
            <input type="submit" value="Publish Blog"/>
        </form>

    <script src="script.js"> </script>   
    </body>
</html>
